# This is a basic workflow to help you get started with Actions

name: build-run-tests

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    runs-on: ubuntu-latest
    permissions: read-all
    steps:
      - name: Login to docker registry
        uses: docker/login-action@v2
        with:
          registry: docker.vitrix.cz
          username: ${{ secrets.VITRIX_DOCKER_USERNAME }}
          password: ${{ secrets.VITRIX_DOCKER_PASSWORD }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build test image
        run: docker-compose -f containers/spider2-tests/docker-compose.yml build

      - name: Run all tests
        run: docker-compose -f containers/spider2-tests/docker-compose.yml run spider2-tests
